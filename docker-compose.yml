services:
  # React アプリケーション
  react-app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - REACT_APP_FIREBASE_API_KEY=${REACT_APP_FIREBASE_API_KEY}
      - REACT_APP_FIREBASE_AUTH_DOMAIN=${REACT_APP_FIREBASE_AUTH_DOMAIN}
      - REACT_APP_FIREBASE_PROJECT_ID=${REACT_APP_FIREBASE_PROJECT_ID}
      - REACT_APP_FIREBASE_STORAGE_BUCKET=${REACT_APP_FIREBASE_STORAGE_BUCKET}
      - REACT_APP_FIREBASE_MESSAGING_SENDER_ID=${REACT_APP_FIREBASE_MESSAGING_SENDER_ID}
      - REACT_APP_FIREBASE_APP_ID=${REACT_APP_FIREBASE_APP_ID}
      - REACT_APP_TWITTER_URL=${REACT_APP_TWITTER_URL}
      - REACT_APP_INSTAGRAM_URL=${REACT_APP_INSTAGRAM_URL}
    depends_on:
      - firebase-emulator
    networks:
      - app-network

  # Firebase Emulator Suite
  firebase-emulator:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "4000:4000"  # Firebase Emulator UI
      - "5000:5000"  # Firestore Emulator
      - "5001:5001"  # Authentication Emulator
      - "9000:9000"  # Hosting Emulator
    volumes:
      - .:/app
    command: >
      ssh -c "
      npm install -g firebase-tools &&
      firebase emulators:start --project=demo-project --import=./firebase-export --export-on-exit=./firebase-export --ui
      "
    environment:
      - FIREBASE_PROJECT=demo-project
    networks:
      - app-network

  # 開発用データベース（オプション）
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: yoon2_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
