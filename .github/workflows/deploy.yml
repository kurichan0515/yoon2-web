name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build project
        run: npm run build
        env:
          NODE_OPTIONS: '--max-old-space-size=2048'
          NEXT_TELEMETRY_DISABLED: '1'
          # NOTE: GitHub Secrets名はREACT_APP_*のまま流用（リネーム保留）
          # 気が向いたタイミングでSecrets側もNEXT_PUBLIC_*に統一すること
          NEXT_PUBLIC_GA4_MEASUREMENT_ID: ${{ secrets.REACT_APP_GA4_MEASUREMENT_ID }}
          NEXT_PUBLIC_GOOGLE_ADS_CONVERSION_ID: 'AW-621590738'
          NEXT_PUBLIC_GOOGLE_ADS_CONVERSION_LABEL: 'ydVVCILc-eAbENLxsqgC'
          NEXT_PUBLIC_GOOGLE_ADS_PAGEVIEW_CONVERSION_LABEL: 'ydVVCILc-eAbENLxsqgC'
          NEXT_PUBLIC_GOOGLE_ADS_HOTPEPPER_CONVERSION_LABEL: 'glIBCLuF8J8cENLxsqgC'
          NEXT_PUBLIC_GOOGLE_ADS_LINE_CONVERSION_LABEL: 'PT4wCL6F8J8cENLxsqgC'
          NEXT_PUBLIC_GOOGLE_ADS_ENABLED: 'true'
          NEXT_PUBLIC_ADSENSE_ENABLED: 'true'
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.REACT_APP_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.REACT_APP_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.REACT_APP_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.REACT_APP_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.REACT_APP_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.REACT_APP_FIREBASE_APP_ID }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        run: firebase deploy --only hosting --token "${{ secrets.FIREBASE_TOKEN }}"

      - name: Submit sitemap to Google Search Console
        run: node scripts/submit-sitemap.js
        env:
          GOOGLE_SEARCH_CONSOLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SEARCH_CONSOLE_SERVICE_ACCOUNT }}
          SEARCH_CONSOLE_SITE_URL: ${{ secrets.SEARCH_CONSOLE_SITE_URL }}
        continue-on-error: true
